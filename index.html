<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>東京旅遊行程表 2026</title>
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Vue 3 & Tailwind -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        [v-cloak] { display: none !important; }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: #fff5f6; 
            color: #5c5c5c; 
            min-height: 100vh; 
            margin: 0;
            overflow-x: hidden;
        }
        .glass-panel { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
        .sakura-header { background: linear-gradient(135deg, #fff1f2 0%, #ffffff 100%); }
        .text-soft-pink { color: #f2bac5; }
        .bg-soft-pink { background-color: #f2bac5; }
        
        /* 櫻花飄落動畫 */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .petal { 
            position: fixed; 
            background: #ffd1dc; 
            border-radius: 100% 0 100% 0; 
            pointer-events: none; 
            z-index: 0; 
            animation: fall linear infinite; 
        }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .sync-dot.on { background: #86efac; box-shadow: 0 0 6px #86efac; }
        .sync-dot.off { background: #fca5a5; }
        
        /* 滑動流暢度 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12">
<div id="app" v-cloak class="max-w-md mx-auto relative z-10">

    <!-- 🔐 暗號入口畫面 -->
    <div v-if="!roomJoined" class="min-h-screen flex items-center justify-center px-6">
        <div class="glass-panel w-full max-w-xs rounded-[2.5rem] p-10 shadow-2xl text-center space-y-6">
            <div>
                <div class="text-5xl mb-4">🌸</div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">Tokyo Journey</p>
                <h1 class="text-2xl font-light text-slate-700 mt-1">Spring <span class="italic font-serif">2026</span></h1>
            </div>
            <div class="space-y-3 text-left">
                <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">房間暗號 (秘密連結)</label>
                <input v-model="roomInput" @keyup.enter="joinRoom"
                    type="text"
                    placeholder="輸入專屬暗號..."
                    class="w-full bg-white border border-slate-100 rounded-2xl py-3 px-4 text-sm focus:outline-none focus:border-pink-200 text-center tracking-widest shadow-inner">
                <p class="text-[9px] text-slate-400 text-center leading-loose">兩個人輸入同一個暗號<br>即可即時編輯與同步行程</p>
            </div>
            <button @click="joinRoom" :disabled="!roomInput"
                class="w-full py-4 bg-slate-800 text-white rounded-2xl text-[10px] font-bold uppercase disabled:opacity-30 hover:bg-slate-700 transition-all active:scale-95 shadow-lg">
                開啟浪漫行程 →
            </button>
            <p v-if="roomError" class="text-[10px] text-red-400">{{ roomError }}</p>
        </div>
    </div>

    <!-- 主畫面 -->
    <div v-if="roomJoined" class="animate-in fade-in duration-500">
        <!-- 儲存狀態浮窗 -->
        <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50">
            <transition name="fade">
                <div v-if="saving" class="bg-white/95 px-5 py-2 rounded-full shadow-lg text-[10px] text-soft-pink font-bold tracking-widest border border-pink-100 flex items-center gap-2">
                    <i class="fa-solid fa-cloud-upload-alt animate-bounce"></i> SYNCING...
                </div>
            </transition>
        </div>

        <header class="sakura-header p-10 rounded-b-[3rem] shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-start">
                <div class="space-y-2">
                    <p class="text-[10px] tracking-[0.4em] font-bold text-soft-pink uppercase">Tokyo Journey</p>
                    <h1 class="text-3xl font-light text-slate-700">Spring <span class="italic font-serif">2026</span></h1>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <span class="text-[8px] bg-slate-100 px-2 py-1 rounded text-slate-400 font-mono">ROOM: {{ roomDisplay }}</span>
                </div>
            </div>
        </header>

        <main class="px-6 -mt-6 space-y-6">
            <!-- 同步狀態 -->
            <section class="glass-panel p-4 rounded-[1.5rem] shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <span class="sync-dot" :class="synced ? 'on' : 'off'"></span>
                    {{ synced ? '連線成功' : '連線中...' }}
                </div>
                <button @click="leaveRoom" class="text-[9px] text-slate-300 hover:text-red-400 flex items-center gap-1 transition-colors">
                    <i class="fa-solid fa-sign-out-alt"></i> 登出
                </button>
            </section>

            <!-- 匯率轉換 (優化計算) -->
            <section class="glass-panel p-6 rounded-[2rem] shadow-lg">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Currency Calc</h2>
                    <span class="text-[8px] text-slate-300 italic">Auto-calculated</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div v-for="(val, key) in currencyLabels" :key="key">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1 block mb-1">{{ val }}</label>
                        <input type="number" v-model.number="currency[key]" @input="handleConvert(key)"
                            class="w-full bg-white border border-slate-100 rounded-xl py-2 px-3 text-xs font-bold focus:outline-none focus:ring-1 focus:ring-pink-200">
                    </div>
                </div>
            </section>

            <!-- 天數切換 -->
            <nav class="flex justify-between items-center px-4 py-2 bg-white/50 backdrop-blur-sm rounded-full shadow-sm sticky top-4 z-20">
                <button v-for="d in 5" :key="d" @click="currentDay = d"
                    :class="['w-10 h-10 rounded-full text-[11px] transition-all', currentDay === d ? 'bg-soft-pink text-white font-bold shadow-md scale-110' : 'text-slate-300']">
                    {{ d }}
                </button>
            </nav>

            <!-- 行程清單 -->
            <div class="space-y-4 pb-10">
                <div v-if="currentEvents.length === 0" class="text-center py-16 text-slate-300 text-[10px] uppercase tracking-[0.2em] border-2 border-dashed border-slate-100 rounded-[2rem]">
                    <i class="fa-solid fa-map-marker-alt block text-2xl mb-2 opacity-20"></i>
                    暫無當日行程
                </div>
                
                <div v-for="(event, idx) in currentEvents" :key="event.id" class="flex gap-4 group animate-in slide-in-from-bottom-4">
                    <div class="w-12 text-[9px] font-bold text-slate-300 pt-4 text-right uppercase font-mono">{{ event.time }}</div>
                    <div class="flex-1 glass-panel p-5 rounded-[1.5rem] relative hover:shadow-md transition-shadow">
                        <button @click="removeEvent(event.id)" class="absolute top-4 right-4 text-slate-200 hover:text-red-400 transition-colors p-2">
                            <i class="fa-solid fa-times text-[10px]"></i>
                        </button>
                        <h3 class="text-sm font-bold text-slate-600 mb-1 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-soft-pink"></span>
                            {{ event.location }}
                        </h3>
                        <p class="text-[10px] text-slate-400 leading-relaxed whitespace-pre-wrap">{{ event.desc }}</p>
                    </div>
                </div>
                
                <button @click="showModal = true" class="w-full ml-14 py-4 border-2 border-dashed border-slate-200 rounded-[1.5rem] text-slate-400 text-[10px] font-bold uppercase hover:bg-white/60 transition-all flex items-center justify-center gap-2" style="width: calc(100% - 56px)">
                    <i class="fa-solid fa-plus text-[8px]"></i> Add New Event
                </button>
            </div>
        </main>

        <!-- 新增行程彈窗 -->
        <div v-if="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
            <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" @click="showModal = false"></div>
            <div class="relative bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl space-y-5 animate-in zoom-in-95">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Day {{ currentDay }} — 新增行程</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-bold text-slate-300 ml-1 uppercase">Time</label>
                        <input v-model="form.time" placeholder="例如 09:00" class="w-full border-b py-2 text-xs focus:outline-none focus:border-pink-300">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-300 ml-1 uppercase">Location</label>
                        <input v-model="form.location" placeholder="要去哪裡呢？" class="w-full border-b py-2 text-xs focus:outline-none focus:border-pink-300">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-300 ml-1 uppercase">Note</label>
                        <textarea v-model="form.desc" placeholder="一些小提醒..." class="w-full border-b py-2 text-xs focus:outline-none focus:border-pink-300 resize-none" rows="2"></textarea>
                    </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button @click="showModal = false" class="flex-1 py-3 text-slate-400 text-[10px] font-bold uppercase">取消</button>
                    <button @click="addEvent" :disabled="!form.location"
                        class="flex-[2] py-3 bg-slate-800 text-white rounded-xl text-[10px] font-bold uppercase disabled:opacity-30 shadow-lg">
                        確認新增
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;

const firebaseConfig = {
    apiKey: "AIzaSyCCM-9AG5IPsEeqOvwV-YTuP8ra6ABXoiw",
    authDomain: "sakura-db2eb.firebaseapp.com",
    databaseURL: "https://sakura-db2eb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sakura-db2eb",
    storageBucket: "sakura-db2eb.firebasestorage.app",
    messagingSenderId: "1018635903034",
    appId: "1:1018635903034:web:b9cff8697598f66be55503"
};

// 初始化一次即可
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();

function hashRoom(str) {
    let hash = 0;
    const cleanStr = str.trim().toLowerCase();
    for (let i = 0; i < cleanStr.length; i++) {
        hash = ((hash << 5) - hash) + cleanStr.charCodeAt(i);
        hash |= 0;
    }
    return 'room_' + Math.abs(hash).toString(36);
}

createApp({
    setup() {
        const roomInput = ref('');
        const roomJoined = ref(false);
        const roomKey = ref('');
        const roomError = ref('');
        const synced = ref(false);
        const saving = ref(false);
        const currentDay = ref(1);
        const showModal = ref(false);
        const currencyLabels = { jpy: 'JPY 日圓', twd: 'TWD 台幣', aud: 'AUD 澳幣' };
        const currency = ref({ jpy: 1000, twd: 211, aud: 10.12 });
        const events = ref([]);
        const form = ref({ time: '', location: '', desc: '' });
        let dbRef = null;

        const roomDisplay = computed(() => {
            if (roomInput.value.length <= 2) return roomInput.value;
            return roomInput.value.slice(0, 1) + '**' + roomInput.value.slice(-1);
        });

        const currentEvents = computed(() =>
            events.value.filter(e => e.day === currentDay.value)
                .sort((a, b) => (a.time || '99:99').localeCompare(b.time || '99:99'))
        );

        const joinRoom = () => {
            if (!roomInput.value.trim()) return;
            roomKey.value = hashRoom(roomInput.value);
            roomJoined.value = true;
            startSync();
        };

        const leaveRoom = () => {
            if (dbRef) dbRef.off();
            roomJoined.value = false;
            synced.value = false;
            events.value = [];
        };

        const startSync = () => {
            dbRef = db.ref(`rooms/${roomKey.value}`);
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    events.value = data.events ? Object.values(data.events) : [];
                    if (data.currency) currency.value = data.currency;
                }
                synced.value = true;
            });
        };

        const saveToCloud = async (newEvents, newCurrency) => {
            if (!dbRef) return;
            saving.value = true;
            const eventsObj = {};
            newEvents.forEach(e => { eventsObj[e.id] = e; });
            try {
                await dbRef.set({ events: eventsObj, currency: newCurrency });
            } finally {
                setTimeout(() => saving.value = false, 500);
            }
        };

        const addEvent = () => {
            if (!form.value.location) return;
            const newEvent = {
                id: Date.now().toString(),
                day: currentDay.value,
                time: form.value.time || '--:--',
                location: form.value.location,
                desc: form.value.desc || ''
            };
            const newEvents = [...events.value, newEvent];
            saveToCloud(newEvents, currency.value);
            showModal.value = false;
            form.value = { time: '', location: '', desc: '' };
        };

        const removeEvent = (id) => {
            const newEvents = events.value.filter(e => e.id !== id);
            saveToCloud(newEvents, currency.value);
        };

        const handleConvert = (src) => {
            const JPY_TWD = 0.211, AUD_TWD = 20.85;
            const c = { ...currency.value };
            if (src === 'jpy') { 
                c.twd = Math.round(c.jpy * JPY_TWD); 
                c.aud = +(c.twd / AUD_TWD).toFixed(2); 
            } else if (src === 'twd') { 
                c.jpy = Math.round(c.twd / JPY_TWD); 
                c.aud = +(c.twd / AUD_TWD).toFixed(2); 
            } else if (src === 'aud') { 
                c.twd = Math.round(c.aud * AUD_TWD); 
                c.jpy = Math.round(c.twd / JPY_TWD); 
            }
            currency.value = c;
            saveToCloud(events.value, c);
        };

        onMounted(() => {
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.width = p.style.height = (Math.random() * 8 + 6) + 'px';
                p.style.animationDuration = (Math.random() * 4 + 6) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                p.style.opacity = Math.random();
                document.body.appendChild(p);
            }
        });

        return {
            roomInput, roomJoined, roomError, roomDisplay,
            synced, saving, currentDay, showModal,
            currency, currencyLabels, form, currentEvents,
            joinRoom, leaveRoom, addEvent, removeEvent, handleConvert
        };
    }
}).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京旅遊行程表</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        [v-cloak] { display: none !important; }
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff5f6; color: #5c5c5c; min-height: 100vh; margin: 0; overflow-x: hidden; touch-action: pan-y; }
        .glass-panel { background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
        .sakura-header { background: linear-gradient(135deg, #fff1f2 0%, #ffffff 100%); }
        .text-soft-pink { color: #f2bac5; }
        .bg-soft-pink { background-color: #f2bac5; }
        
        @keyframes fall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
        .petal { 
            position: fixed; 
            background: #ffd1dc; 
            border-radius: 100% 0 100% 0; 
            pointer-events: none; 
            z-index: 0; 
            animation: fall linear infinite; 
            box-shadow: 0 0 5px rgba(255,182,193,0.3);
        }

        .sortable-ghost { opacity: 0.2; transform: scale(0.95); background: #f2bac5 !important; border: 2px dashed #f2bac5; }
        .sortable-drag { opacity: 1; transform: rotate(1.5deg) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.12); z-index: 1000; }
        
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .sync-dot.on { background: #86efac; box-shadow: 0 0 8px #86efac; }
        .sync-dot.off { background: #fca5a5; }

        input, textarea { font-family: inherit; background: transparent; }
        .editable-input { border: none; padding: 4px 0; width: 100%; color: inherit; font-size: inherit; font-weight: inherit; font-style: inherit; font-family: inherit; line-height: 1.4; }
        .editable-input:focus { outline: none; background: rgba(242, 186, 197, 0.1); border-radius: 4px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .action-btn {
            background: white;
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .header-image-container {
            width: 80px; height: 80px; border-radius: 1.5rem;
            overflow: hidden; background: #fdf2f2; border: 2px solid white;
            box-shadow: 0 4px 15px rgba(242, 186, 197, 0.2);
            flex-shrink: 0; cursor: pointer; position: relative;
        }
        .header-image-container img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="pb-12">
<div id="app" v-cloak class="max-w-lg mx-auto relative z-10">

    <!-- 🔐 暗號入口 -->
    <div v-if="!roomJoined" class="min-h-screen flex items-center justify-center px-6">
        <div class="glass-panel w-full max-w-sm rounded-[3rem] p-12 shadow-2xl text-center space-y-8">
            <div>
                <div class="text-6xl mb-6">🌸</div>
                <p class="text-[12px] font-bold text-slate-400 uppercase tracking-[0.4em]">Tokyo Journey</p>
                <h1 class="text-3xl font-light text-slate-700 mt-2">Spring <span class="italic font-serif">2026</span></h1>
            </div>
            <div class="space-y-4 text-left">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">房間暗號</label>
                <input v-model="roomInput" @keyup.enter="joinRoom" type="password" placeholder="輸入你們的暗號..."
                    class="w-full bg-white border border-slate-100 rounded-2xl py-4 px-5 text-base focus:outline-none focus:border-pink-200 text-center tracking-widest shadow-sm">
            </div>
            <button @click="joinRoom" :disabled="!roomInput"
                class="w-full py-5 bg-slate-800 text-white rounded-2xl text-[12px] font-bold uppercase disabled:opacity-30 hover:bg-slate-700 transition-all shadow-lg active:scale-95">
                進入行程 →
            </button>
        </div>
    </div>

    <!-- 主畫面 -->
    <div v-if="roomJoined">
        <div class="fixed top-6 left-1/2 -translate-x-1/2 z-[110]">
            <div v-if="saving" class="bg-white/95 px-6 py-3 rounded-full shadow-xl text-[11px] text-soft-pink font-bold tracking-widest border border-pink-100 flex items-center gap-3">
                <i class="fa-solid fa-sync animate-spin"></i> UPDATING...
            </div>
        </div>

        <header class="sakura-header p-12 rounded-b-[4rem] shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-center">
                <div class="space-y-2 flex-1 mr-4">
                    <input v-model="config.title" @change="updateConfig" class="editable-input text-[12px] tracking-[0.4em] font-bold text-soft-pink uppercase" placeholder="點擊編輯標題">
                    <input v-model="config.subtitle" @change="updateConfig" class="editable-input text-4xl font-light text-slate-700" placeholder="Spring 2026">
                    
                    <!-- 天氣資訊 (點兩下自定義地區) -->
                    <div @dblclick="promptCity" class="flex flex-col gap-1.5 text-[12px] text-slate-400 font-bold mt-2 cursor-pointer hover:text-pink-300 transition-colors">
                        <div v-if="weather" class="flex items-center gap-3">
                            <div class="flex items-center gap-1.5">
                                <i class="fa-solid fa-cloud-sun text-pink-200"></i>
                                <span>{{ config.city || 'TOKYO' }}: {{ weather.temp }}°C</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <i class="fa-solid fa-umbrella text-blue-200"></i>
                                <span>{{ weather.rain }}%</span>
                            </div>
                        </div>
                        <div v-else class="text-[10px] opacity-50 italic">天氣載入中... (點兩下更換地區)</div>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-3 shrink-0">
                    <div @click="triggerFileUpload" class="header-image-container group">
                        <img v-if="config.coverUrl" :src="config.coverUrl" alt="Cover">
                        <div v-else class="flex flex-col items-center justify-center h-full text-pink-200"><i class="fa-solid fa-camera-retro text-xl"></i></div>
                        <input type="file" ref="imageInput" class="hidden" accept="image/*" @change="onImageSelected">
                    </div>
                    <button @click="toggleLang" class="text-[11px] font-bold text-slate-400 border-b-2 border-slate-100 uppercase px-3 py-1">{{ lang === 'zh' ? 'English' : '中文' }}</button>
                </div>
            </div>
        </header>

        <main class="px-6 -mt-8 space-y-8">
            <section class="glass-panel p-5 rounded-[2rem] shadow-sm flex items-center justify-between">
                <div class="flex items-center gap-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                    <span class="sync-dot" :class="synced ? 'on' : 'off'"></span> {{ synced ? t('即時同步中') : t('連線中...') }}
                </div>
            </section>

            <!-- 天數切換與編輯 (支援點兩下編輯名稱) -->
            <div class="flex items-center gap-3 overflow-x-auto pb-2 no-scrollbar">
                <div class="flex bg-white/60 backdrop-blur-sm rounded-full shadow-sm p-2 gap-1.5 shrink-0">
                    <div v-for="day in config.days" :key="day.id">
                        <button @click="currentDayId = day.id" @dblclick="editDayLabel(day)"
                            :class="['px-5 h-12 rounded-full text-xs transition-all min-w-[50px] relative', currentDayId === day.id ? 'bg-soft-pink text-white font-bold shadow-md' : 'text-slate-300']">
                            {{ day.label }}
                        </button>
                    </div>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button @click="addDay" class="w-10 h-10 rounded-full bg-white/60 text-slate-400 flex items-center justify-center text-xs shadow-sm">+</button>
                    <button @click="removeLastDay" v-if="config.days.length > 1" class="w-10 h-10 rounded-full bg-white/60 text-slate-300 flex items-center justify-center text-xs shadow-sm">-</button>
                </div>
            </div>

            <!-- 行程清單 -->
            <div id="event-list" class="space-y-6">
                <div v-for="event in sortedEvents" :key="event.id" :data-id="event.id" class="flex gap-5 group">
                    <!-- 時間標籤 -->
                    <div class="w-12 text-[11px] font-bold text-slate-300 pt-5 text-right uppercase tracking-tighter">
                        {{ event.timeDisplay || '' }}
                    </div>
                    
                    <!-- 行程卡片 -->
                    <div @click="openEdit(event)" class="flex-1 glass-panel p-6 rounded-[2.5rem] relative cursor-pointer active:scale-[0.98] transition-all hover:shadow-md">
                        <button @click.stop="removeEvent(event.id)" class="absolute top-5 right-6 text-slate-200 hover:text-red-400"><i class="fa-solid fa-trash text-xs"></i></button>
                        
                        <h3 class="text-base font-bold text-slate-600 mb-2">{{ event.location }}</h3>
                        <p v-if="event.desc" class="text-[13px] text-slate-400 leading-relaxed mb-5">{{ event.desc }}</p>
                        
                        <div class="flex flex-wrap gap-2">
                            <button v-if="event.mapUrl" @click.stop="openMap(event.mapUrl)" class="action-btn flex items-center gap-2 px-4 py-2 rounded-full text-[11px] font-bold text-slate-500">
                                <i class="fa-solid fa-map-location-dot text-red-300"></i> {{ t('地圖資訊') }}
                            </button>
                            <button v-if="event.routeA && event.routeB" @click.stop="openRoute(event.routeA, event.routeB)" class="action-btn flex items-center gap-2 px-4 py-2 rounded-full text-[11px] font-bold text-slate-500">
                                <i class="fa-solid fa-route text-blue-300"></i> {{ event.routeName || (event.routeA + ' ➔ ' + event.routeB) }}
                            </button>
                            <button v-if="event.videoUrl" @click.stop="openVideo(event.videoUrl)" class="action-btn flex items-center gap-2 px-4 py-2 rounded-full text-[11px] font-bold text-slate-500">
                                <i class="fa-solid fa-bookmark text-orange-300"></i> {{ event.videoName || t('查看參考') }}
                            </button>
                        </div>
                    </div>
                </div>
                
                <button @click="showModal = true; editingId = null; resetForm()" 
                    class="w-full ml-16 py-5 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-300 text-[12px] font-bold uppercase" style="width: calc(100% - 64px)">
                    + {{ t('New Entry') }}
                </button>
            </div>
        </main>

        <!-- 編輯行程彈窗 -->
        <div v-if="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
            <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" @click="showModal = false"></div>
            <div class="relative bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl space-y-4 overflow-hidden flex flex-col max-h-[90vh]">
                <div class="text-center shrink-0 mb-2">
                    <p class="text-[12px] font-bold text-slate-400 uppercase tracking-widest">{{ editingId ? t('Edit Entry') : t('New Entry') }}</p>
                </div>
                <div class="space-y-4 overflow-y-auto pr-2 no-scrollbar flex-1 pb-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">{{ t('時間') }}</label>
                            <input v-model="form.time" placeholder="09:00" class="w-full border-b py-2 text-sm focus:outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">{{ t('標題') }}</label>
                            <input v-model="form.location" placeholder="行程名稱" class="w-full border-b py-2 text-sm focus:outline-none">
                        </div>
                    </div>
                    
                    <div class="bg-slate-50 p-4 rounded-2xl space-y-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-2"><i class="fa-solid fa-map-signs"></i> 路線規劃</label>
                        <div class="flex items-center gap-2">
                            <input v-model="form.routeA" placeholder="起點" class="flex-1 bg-white border rounded-lg px-3 py-2 text-xs focus:outline-none">
                            <span class="text-slate-300">➔</span>
                            <input v-model="form.routeB" placeholder="終點" class="flex-1 bg-white border rounded-lg px-3 py-2 text-xs focus:outline-none">
                        </div>
                        <input v-model="form.routeName" placeholder="按鈕文字" class="w-full bg-white border rounded-lg px-3 py-2 text-xs focus:outline-none">
                    </div>

                    <div class="bg-orange-50/30 p-4 rounded-2xl space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-2"><i class="fa-solid fa-link"></i> 連結</label>
                        <input v-model="form.videoUrl" placeholder="網址" class="w-full border-b py-1 text-sm focus:outline-none border-orange-100">
                        <input v-model="form.videoName" placeholder="顯示名稱" class="w-full border-b py-1 text-sm focus:outline-none border-orange-100 opacity-70">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">{{ t('地圖資訊') }}</label>
                        <input v-model="form.mapUrl" placeholder="Google Maps Link" class="w-full border-b py-2 text-sm focus:outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">{{ t('備註') }}</label>
                        <textarea v-model="form.desc" placeholder="..." class="w-full border-b py-2 text-sm focus:outline-none resize-none h-20"></textarea>
                    </div>
                </div>
                <button @click="saveEvent" :disabled="!form.location"
                    class="w-full py-5 bg-slate-800 text-white rounded-2xl text-[12px] font-bold uppercase shadow-xl shrink-0">
                    {{ t('Confirm') }}
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;

const firebaseConfig = {
    apiKey: "", 
    authDomain: "sakura-db2eb.firebaseapp.com",
    databaseURL: "https://sakura-db2eb-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sakura-db2eb",
    appId: "1:1018635903034:web:b9cff8697598f66be55503"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function hashRoom(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
    return 'room_' + Math.abs(hash).toString(36);
}

createApp({
    setup() {
        const roomInput = ref('');
        const roomJoined = ref(false);
        const roomKey = ref('');
        const synced = ref(false);
        const saving = ref(false);
        const imageInput = ref(null);
        const currentDayId = ref('d1');
        const lang = ref('zh');
        const showModal = ref(false);
        const editingId = ref(null);
        const events = ref([]);
        const weather = ref(null);
        
        const config = ref({
            title: '東京旅遊行程表', subtitle: 'Spring 2026', coverUrl: '', city: 'TOKYO', lat: 35.6895, lon: 139.6917,
            days: [ { id: 'd1', label: '1' }, { id: 'd2', label: '2' }, { id: 'd3', label: '3' }, { id: 'd4', label: '4' }, { id: 'd5', label: '5' } ]
        });

        const form = ref({ time: '', location: '', desc: '', mapUrl: '', videoUrl: '', videoName: '', routeA: '', routeB: '', routeName: '' });
        
        let dbRef = null;
        let sortableInstance = null;

        const t = (text) => {
            const dic = {
                '地圖資訊': { en: 'Map Info' }, '查看參考': { en: 'References' },
                '即時同步中': { en: 'Syncing' }, 'New Entry': { en: 'Add Event' },
                '時間': { en: 'Time' }, '標題': { en: 'Title' }, 'Confirm': { en: 'Save' }
            };
            return lang.value === 'zh' ? text : (dic[text] ? dic[text].en : text);
        };

        // 時間自動升序排序 (只有時間順序有變，這裡保留智慧排序邏輯)
        const sortedEvents = computed(() => {
            const dayEvents = events.value.filter(e => e.dayId === currentDayId.value);
            const hasManual = dayEvents.some(e => e.manualOrder !== undefined);

            const processed = dayEvents.map(e => ({
                ...e,
                timeDisplay: (e.time && e.time !== '待定') ? e.time : ''
            }));

            if (hasManual) {
                return processed.sort((a, b) => (a.manualOrder || 0) - (b.manualOrder || 0));
            } else {
                return processed.sort((a, b) => {
                    const tA = a.timeDisplay || '99:99';
                    const tB = b.timeDisplay || '99:99';
                    return tA.localeCompare(tB);
                });
            }
        });

        const initSortable = () => {
            const el = document.getElementById('event-list');
            if (!el || !roomJoined.value) return;
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(el, {
                animation: 200, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', delay: 100, delayOnTouchOnly: true,
                onEnd: async () => {
                    const sortedIds = sortableInstance.toArray();
                    events.value.forEach(e => {
                        const newIdx = sortedIds.indexOf(e.id);
                        if (newIdx !== -1) e.manualOrder = newIdx;
                    });
                    await saveToCloud();
                }
            });
        };

        watch([currentDayId, roomJoined], () => nextTick(() => initSortable()));

        const joinRoom = () => {
            if (!roomInput.value.trim()) return;
            roomKey.value = hashRoom(roomInput.value.trim());
            roomJoined.value = true;
            dbRef = db.ref(`rooms/${roomKey.value}`);
            dbRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    events.value = data.events ? Object.values(data.events) : [];
                    if (data.config) config.value = { ...config.value, ...data.config };
                }
                synced.value = true;
                nextTick(() => initSortable());
                fetchWeather();
            });
        };

        const saveToCloud = async () => {
            if (!dbRef) return;
            saving.value = true;
            const eventsObj = {};
            events.value.forEach(e => { eventsObj[e.id] = e; });
            await dbRef.set({ events: eventsObj, config: config.value });
            setTimeout(() => saving.value = false, 400);
        };

        const saveEvent = async () => {
            const isNew = !editingId.value;
            const id = editingId.value || Date.now().toString();
            const eventData = { id, dayId: currentDayId.value, ...form.value };

            if (!isNew) {
                const idx = events.value.findIndex(e => e.id === editingId.value);
                eventData.manualOrder = events.value[idx].manualOrder;
                events.value[idx] = eventData;
            } else {
                events.value.push(eventData);
            }
            await saveToCloud();
            showModal.value = false;
        };

        // 🟢 修復：天數標籤點兩下編輯功能
        const editDayLabel = (day) => {
            const newLabel = prompt("輸入新的天數名稱:", day.label);
            if (newLabel !== null && newLabel.trim() !== "") {
                day.label = newLabel.trim();
                updateConfig();
            }
        };

        // 🟢 修復：天氣資訊點兩下自定義地區功能
        const promptCity = async () => {
            const cityName = prompt("請輸入欲查看的地區 (例如: 大阪, 新宿):", config.value.city || "TOKYO");
            if (cityName) {
                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=zh&format=json`);
                    const geoData = await geoRes.json();
                    if (geoData.results && geoData.results[0]) {
                        const result = geoData.results[0];
                        config.value.city = result.name.toUpperCase();
                        config.value.lat = result.latitude;
                        config.value.lon = result.longitude;
                        updateConfig();
                        fetchWeather(); // 立即重新抓取該地天氣
                    } else {
                        alert("找不到該地區資訊，請換個名稱試試！");
                    }
                } catch (e) {
                    alert("連線失敗，請稍後再試。");
                }
            }
        };

        const fetchWeather = async () => {
            const lat = config.value.lat || 35.6895;
            const lon = config.value.lon || 139.6917;
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=precipitation_probability_max&timezone=auto`);
                const data = await res.json();
                weather.value = { 
                    temp: Math.round(data.current_weather.temperature),
                    rain: data.daily.precipitation_probability_max[0] || 0
                };
            } catch (e) {}
        };

        const openEdit = (e) => { editingId.value = e.id; form.value = { ...e }; showModal.value = true; };
        const resetForm = () => { form.value = { time: '', location: '', desc: '', mapUrl: '', videoUrl: '', videoName: '', routeA: '', routeB: '', routeName: '' }; };
        const removeEvent = (id) => { events.value = events.value.filter(e => e.id !== id); saveToCloud(); };
        const updateConfig = () => saveToCloud();
        const addDay = () => { config.value.days.push({ id: 'd' + Date.now(), label: String(config.value.days.length + 1) }); updateConfig(); };
        const removeLastDay = () => { if(config.value.days.length > 1) { config.value.days.pop(); updateConfig(); } };
        const toggleLang = () => { lang.value = lang.value === 'zh' ? 'en' : 'zh'; };
        const triggerFileUpload = () => imageInput.value.click();
        const openMap = (u) => window.open(u.startsWith('http') ? u : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(u)}`, '_blank');
        const openRoute = (a, b) => window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(a)}&destination=${encodeURIComponent(b)}&travelmode=transit`, '_blank');
        const openVideo = (u) => window.open(u, '_blank');

        const onImageSelected = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 500; let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    config.value.coverUrl = canvas.toDataURL('image/jpeg', 0.8);
                    updateConfig();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        onMounted(() => {
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'petal';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-5vh';
                p.style.width = p.style.height = (Math.random() * 8 + 6) + 'px';
                p.style.animationDuration = (Math.random() * 8 + 7) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                document.body.appendChild(p);
            }
        });

        return {
            roomInput, roomJoined, synced, saving, currentDayId, config, lang, showModal, editingId, imageInput,
            form, sortedEvents, weather,
            joinRoom, saveEvent, openEdit, removeEvent, updateConfig, addDay, removeLastDay, triggerFileUpload, onImageSelected, openMap, openRoute, openVideo, t, resetForm, toggleLang, editDayLabel, promptCity
        };
    }
}).mount('#app');
</script>
